<script>

// 🔐 PASSCODE
const PASS = "colsnist";

// ---------- SAVE SPIKES ----------
function saveSpike(value){
  let spikes = JSON.parse(localStorage.getItem("spikes") || "[]");
  spikes.push(value);
  localStorage.setItem("spikes", JSON.stringify(spikes));
}

// ---------- LOAD SPIKES ----------
function getSpikes(){
  return JSON.parse(localStorage.getItem("spikes") || "[]");
}

// ---------- CLEAR ----------
function clearSpikes(){
  localStorage.removeItem("spikes");
  alert("History cleared");
}

// ---------- TIME ----------
function parseTime(t){
  let parts = t.split(":").map(Number);
  if(parts.length !== 3 || parts.some(isNaN)) return null;
  return {h:parts[0], m:parts[1], s:parts[2]};
}

function format(h,m,s){
  if(s >= 60){ m += Math.floor(s/60); s%=60; }
  if(m >= 60){ h += Math.floor(m/60); m%=60; }
  h = h % 24;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ---------- ANALYSIS ----------
function analyze(spikes){
  if(spikes.length === 0) return "med";

  let avg = spikes.reduce((a,b)=>a+b,0) / spikes.length;

  if(avg < 2) return "low";
  if(avg < 5) return "med";
  return "high";
}

// ---------- VOL ----------
function nextVol(current){
  const r = Math.random();

  if(current === "high"){
    if(r < 0.5) return "high";
    if(r < 0.8) return "med";
    return "low";
  }

  if(current === "med"){
    if(r < 0.4) return "med";
    if(r < 0.7) return "high";
    return "low";
  }

  if(r < 0.5) return "low";
  if(r < 0.85) return "med";
  return "high";
}

// ---------- RANGE ----------
function makeRange(vol){
  if(vol === "low"){
    return `${(1 + Math.random()*2).toFixed(1)}x – ${(2.5 + Math.random()*3).toFixed(1)}x`;
  }
  if(vol === "med"){
    return `${(2 + Math.random()*3).toFixed(1)}x – ${(8 + Math.random()*6).toFixed(1)}x`;
  }
  return `${(5 + Math.random()*10).toFixed(1)}x – ${(20 + Math.random()*40).toFixed(1)}x`;
}

// ---------- MAIN ----------
function generate(){

  let t = document.getElementById("time").value.trim();
  let s = parseFloat(document.getElementById("spike").value);

  let time = parseTime(t);

  if(!time){
    alert("Invalid time format (HH:MM:SS)");
    return;
  }

  if(isNaN(s) || s <= 0){
    alert("Enter valid spike number");
    return;
  }

  // 💾 SAVE SPIKE
  saveSpike(s);

  // 📊 USE HISTORY
  let history = getSpikes();
  let currentVol = analyze(history);

  let output = [];

  for(let i=1;i<=5;i++){

    currentVol = nextVol(currentVol);

    let h = time.h;
    let m = time.m + (i*2);
    let sec = time.s;

    output.push(`
      <p class="${currentVol}">
        Window ${i}: <span class="range">${makeRange(currentVol)}</span><br>
        Time: ${format(h,m,sec)} – ${format(h,m+2,sec)}
      </p>
    `);
  }

  document.getElementById("result").innerHTML = `
    <h3>📡 Future Windows</h3>
    <p>Total Stored Spikes: ${history.length}</p>
    <p>Pattern: <b class="${currentVol}">${currentVol.toUpperCase()}</b></p>
    ${output.join("")}
  `;
}

// ---------- LOCK ----------
function unlock(){
  const field = document.getElementById("passcode");
  const input = field.value.trim();

  if(input === PASS){
    document.getElementById("lockscreen").style.display = "none";
  } else {
    document.getElementById("error").innerText = "Wrong passcode";
    field.value = "";
  }
}

</script>
